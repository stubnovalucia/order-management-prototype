services:
  db:
    image: mariadb:latest
    container_name: mariadb_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: order_management
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "healthcheck.sh",
          "--su-mysql",
          "--connect",
          "--innodb_initialized",
        ]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 5

  db_test:
    image: mariadb:latest
    container_name: mariadb_test
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: order_management_test
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
    ports:
      - "3308:3306"
    volumes:
      - mariadb_test_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "healthcheck.sh",
          "--su-mysql",
          "--connect",
          "--innodb_initialized",
        ]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build: ./Api
    container_name: backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      db_test:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://user:password@mariadb_db:3307/order_management"
      TEST_DATABASE_URL: "mysql://test_user:test_password@mariadb_test:3308/order_management_test"
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./Web
    container_name: frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"

volumes:
  mariadb_data:
  mariadb_test_data:
